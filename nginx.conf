server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA routing: redirect everything to index.html
    location / {
        try_files $uri /index.html;
    }

    # Optional: handle static assets correctly
    location /assets/ {
        try_files $uri =404;
    }
}